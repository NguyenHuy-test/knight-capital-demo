name: Knight Capital Advanced Guard
on: [push, pull_request]
jobs:
  comprehensive-check:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lay ma nguon (Checkout)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 2. Thiet lap Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
        
      # LỚP BẢO VỆ 1: QUÉT SÂU BẰNG KỊCH BẢN (Custom Regex Scan)
      - name: Layer 1 - Custom Script Scan
        run: |
          echo "🔍 Dang quet tu khoa nhay cam va bien so..."
          
          # Bẫy 1: Bắt tên hàm nguy hiểm (Kể cả khi bị đổi tên một phần)
          if grep -r "activatePowerPegMode" src/main/java; then
            echo "❌ CẢNH BÁO: Phat hien ham Power Peg cu! Dung Pipeline ngay lap tuc."
            exit 1
          fi
          
          # Bẫy 2: Bắt việc dùng biến cũ (ví dụ: receivedFlag)
          if grep -r -E "\breceivedFlag\b" src/main/java; then
            echo "❌ CẢNH BÁO: Phat hien bien cam 'receivedFlag' duoc su dung!"
            exit 1
          fi

          # Bẫy 3: Bắt lỗi dùng System.out.println (Ép dùng Logger)
          if grep -r "System.out.println" src/main/java; then
            echo "❌ CẢNH BÁO: Khong dung System.out.println trong code Production!"
            exit 1
          fi

      # LỚP BẢO VỆ 2: PHÂN TÍCH SÂU (Deep Scan)
      - name: Layer 2 - SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=NguyenHuy-test_knight-capital-demo
 
      # BƯỚC CUỐI: ĐÓNG GÓI
      - name: 3. Dong goi san pham (Build Artifact)
        run: mvn -B package --file pom.xml
