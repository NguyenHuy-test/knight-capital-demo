name: Knight Capital Advanced Guard
on: [push, pull_request]
jobs:
  comprehensive-check:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lay ma nguon (Checkout)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 2. Thiet lap Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
        
      # LỚP BẢO VỆ 1: QUÉT NHANH (Fast Fail)
      - name: Layer 1 - Custom Script Scan
        run: |
          echo "🔍 Dang quet tu khoa nhay cam..."
          if grep -r "activatePowerPegMode" src/main/java; then
            echo "❌ CANH BAO: Phat hien ham Power Peg cu! Dung Pipeline ngay lap tuc."
            exit 1
          fi

      # LỚP BẢO VỆ 2: PHÂN TÍCH SÂU (Deep Scan)
      - name: Layer 2 - SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # BẠN HÃY SỬA CHỮ "Tên_Project_Của_Bạn" Ở DÒNG DƯỚI THÀNH PROJECT KEY TRÊN SONARCLOUD NHÉ
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=NguyenHuy-test_knight-capital-demo
 
      # BƯỚC CUỐI: ĐÓNG GÓI
      - name: 3. Dong goi san pham (Build Artifact)
        run: mvn -B package --file pom.xml
